<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gallery</title>
  </head>
  <body class="bg-gray-100 m-0">
    <header class="m-0 bg-slate-700 p-5">
      <h1 class="text-3xl font-bold text-left text-white ml-3">
        Our Photo Gallery
      </h1>
      <nav class="flex gap-4 mt-4 justify-start">
        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          All
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Nature
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Animal
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Technology
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          People
        </button>
      </nav>
    </header>

    <main
      class="overflow-x-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4"
    >
      <!--People Image-->
      <div class="overflow-hidden rounded-lg shadow-lg">
        <img
          class="w-full h-48 object-cover hover:scale-110 transition duration-300"
          src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600&auto=format&fit=crop&q=60"
          alt="Portrait Person"
        />
      </div>

      <div class="overflow-hidden rounded-lg shadow-lg">
        <img
          class="w-full h-48 object-cover hover:scale-110 transition duration-300"
          src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600&auto=format&fit=crop&q=60"
          alt="Smiling Woman"
        />
      </div>

      <div class="overflow-hidden rounded-lg shadow-lg">
        <img
          class="w-full h-48 object-cover hover:scale-110 transition duration-300"
          src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&auto=format&fit=crop&q=60"
          alt="Man Portrait"
        />
      </div>

      <div class="overflow-hidden rounded-lg shadow-lg">
        <img
          class="w-full h-48 object-cover hover:scale-110 transition duration-300"
          src="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?w=600&auto=format&fit=crop&q=60"
          alt="Group of People"
        />
      </div>
    </main>
  </body>
</html>
