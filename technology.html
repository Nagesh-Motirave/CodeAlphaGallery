<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gallery</title>
  </head>
  <body class="bg-gray-100 m-0">
    <header class="m-0 bg-slate-700 p-5">
      <h1 class="text-3xl font-bold text-left text-white ml-3">
        Our Photo Gallery
      </h1>
      <nav class="flex gap-4 mt-4 justify-start">
        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          All
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Nature
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Animal
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          Technology
        </button>

        <button
          class="px-4 py-2 text-white bg-slate-700 rounded-lg hover:bg-pink-500 transition active:scale-95"
        >
          People
        </button>
      </nav>
    </header>

    <main
      class="overflow-x-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4"
    >
      <!--People Image-->
      <div class="overflow-hidden rounded-lg shadow-lg">
  <img
    class="w-full h-48 object-cover hover:scale-110 transition duration-300"
    src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f?w=600&auto=format&fit=crop&q=60"
    alt="Laptop"
  />
</div>

<div class="overflow-hidden rounded-lg shadow-lg">
  <img
    class="w-full h-48 object-cover hover:scale-110 transition duration-300"
    src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=600&auto=format&fit=crop&q=60"
    alt="Coding Setup"
  />
</div>

<div class="overflow-hidden rounded-lg shadow-lg">
  <img
    class="w-full h-48 object-cover hover:scale-110 transition duration-300"
    src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600&auto=format&fit=crop&q=60"
    alt="Programming"
  />
</div>

<div class="overflow-hidden rounded-lg shadow-lg">
  <img
    class="w-full h-48 object-cover hover:scale-110 transition duration-300"
    src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600&auto=format&fit=crop&q=60"
    alt="AI Robot"
  />
</div>
    </main>
  </body>
</html>
